<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Online - Spring Boot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
            rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div id="auth-page">
    <div class="form-container">
        <div class="brand">
            <span class="brand-icon">◈</span>
            <span class="brand-name">NightChat</span>
        </div>
        <h2>Entrar na sala</h2>
        <p class="subtitle">Cadastre-se ou acesse com sua conta</p>
        <form id="authForm">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="seu_username" required />
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required />
            </div>
            <button type="submit">
                <span>Cadastrar e Entrar</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </form>
        <p id="error-message" class="hidden"></p>
    </div>
</div>

<div id="chat-page" class="hidden">
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <span class="brand-icon small">◈</span>
                <div>
                    <h2>Sala Pública</h2>
                    <span class="status-indicator"><span class="dot"></span>ao vivo</span>
                </div>
            </div>
            <div class="header-decor">LIVE</div>
        </div>
        <ul id="messageArea"></ul>
        <form id="messageForm">
            <input type="text" id="message" placeholder="Escreva sua mensagem..." autocomplete="off" required />
            <button type="submit" aria-label="Enviar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5">
                    <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" />
                </svg>
            </button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="script.js"></script>
</body>

</html>
