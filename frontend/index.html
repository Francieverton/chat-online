<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="username-page">
        <div class="username-page-container">
            <h1 class="title">Digite seu nome</h1>
            <form id="usernameForm" name="usernameForm">
                <input type="text" id="name" placeholder="Nome de usuário..." autocomplete="off" required />
                <button type="submit">Entrar no Chat</button>
            </form>
        </div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="chat-container">
            <div class="chat-header">
                <h2>Chat Público</h2>
            </div>
            <ul id="messageArea">
            </ul>
            <form id="messageForm" name="messageForm" nameForm="messageForm">
                <input type="text" id="message" placeholder="Digite uma mensagem..." autocomplete="off" required />
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
